# Nginx en Debian delante del stack Docker (web en 127.0.0.1:8080).
# .env del compose: HTTP_LISTEN_ADDR=127.0.0.1  HTTP_PORT=8080
#
# 1) Copiar y ajustar server_name y rutas SSL.
# 2) Fase inicial (solo HTTP, para certbot --nginx o validar proxy):
#    dejar activo solo el bloque "listen 80" que hace proxy_pass.
# 3) Fase producción: comentar ese bloque y descomentar el par redirect + TLS.

upstream pos_docker_web {
    server 127.0.0.1:8080;
    keepalive 32;
}

# --- Fase 1: bootstrap (obtener certificado o pruebas sin TLS) ---
server {
    listen 80;
    listen [::]:80;
    server_name pos.ejemplo.com;

    location / {
        proxy_pass http://pos_docker_web;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

